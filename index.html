<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cruds Project</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="crud">
      <div class="head">
        <h1>CRUDS</h1>
        <p>Product Management System</p>
      </div>
      <div class="inputs">
        <input type="text" id="title" placeholder="Title" />
        <div class="price">
          <input onkeyup="getTotal()" type="number" name="" id="price" placeholder="Price" />
          <input onkeyup="getTotal()" type="number" name="" id="taxes" placeholder="Taxes" />
          <input onkeyup="getTotal()" type="number" name="" id="ads" placeholder="Ads" />
          <input onkeyup="getTotal()" type="number" name="" id="discount" placeholder="Discount" />
          <small id="total"></small>
        </div>
        <input type="number" name="" id="count" placeholder="Count" />
        <input type="text" id="category" placeholder="Category" />
        <button id="submit">Create</button>
      </div>
      <div class="outputs">
        <div class="searchBox">
          <input onkeyup="searchData(this.value)" type="text" id="search" placeholder="Search" />
          <div class="btns">
            <button onclick="getSearchMood(this.id)" id="searchTitle">Search by Title</button>
            <button onclick="getSearchMood(this.id)" id="searchCategory">Search by Category</button>
          </div>
        </div>
        <div id="deleteAll">
          
        </div>
        <table>
          <thead>
            <th>ID</th>
            <th>Title</th>
            <th>Price</th>
            <th>Taxes</th>
            <th>Ads</th>
            <th>Discount</th>
            <th>Total</th>
            <th>Category</th>
            <th>Update</th>
            <th>Delete</th>
          </thead>
          <tbody id="tbody">
            <!-- Data PLace -->
          </tbody>
        </table>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
